<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Counterpart Health — Laptop Setup</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
  :root{
    --cph:#444AD3;
    --clover:#0F4D43;
    --bg:#f6f8fb;
    --card:#fff;
    --border:#e8edf5;
    --muted:#666;
    --text:#111;
    --warn:#c11;
  }
  *{box-sizing:border-box}
  body{
    font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);margin:0;padding:16px;color:var(--text);
    line-height:1.55;
  }
  .wrap{
    max-width:860px;margin:12px auto;background:var(--card);
    border-radius:12px;padding:24px;
    box-shadow:0 4px 20px rgba(12,24,48,0.06);
  }

  /* ── Header ── */
  header{margin-bottom:4px}
  .header-logo{display:block;max-height:56px;width:auto;margin-bottom:10px}
  .sub{font-size:.88rem;color:var(--muted);margin:0 0 2px}
  .phase-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .phase-heading{
    font-size:.95rem;font-weight:700;color:var(--text);margin:0;
  }
  .pill{
    display:inline-block;background:#eef3fb;color:var(--cph);
    padding:5px 12px;border-radius:999px;font-weight:700;
    font-size:.82rem;white-space:nowrap;margin-top:4px;
  }

  /* ── Progress ── */
  .progress-wrap{margin:16px 0 18px;display:flex;gap:4px}
  .progress-seg{
    flex:1;height:8px;border-radius:99px;background:#e4e8f0;overflow:hidden;
    position:relative;
  }
  .progress-seg .fill{
    position:absolute;left:0;top:0;height:100%;
    background:var(--cph);border-radius:99px;width:0%;
    transition:width .3s ease;
  }
  .phase-labels{
    display:flex;gap:4px;margin:-10px 0 14px;
  }
  .phase-label{
    flex:1;text-align:center;font-size:.7rem;color:var(--muted);
    font-weight:600;letter-spacing:.02em;
  }
  .phase-label.active{color:var(--cph);font-weight:700}

  /* ── Card ── */
  .card{
    border-radius:10px;padding:20px;margin:8px 0;
    border:1px solid var(--border);background:var(--card);
    transition:opacity .15s ease;
  }
  .step-title{
    font-weight:700;color:var(--cph);margin-bottom:10px;font-size:1.2rem;
  }

  /* ── Account badges ── */
  .badge{
    display:inline-flex;align-items:center;gap:5px;
    padding:2px 10px;border-radius:4px;font-weight:700;font-size:.85rem;
    vertical-align:middle;
  }
  .badge-cph{background:#eef0ff;color:var(--cph)}
  .badge-clover{background:#e8f5f0;color:var(--clover)}
  .badge .dot{width:8px;height:8px;border-radius:2px;display:inline-block}
  .badge-cph .dot{background:var(--cph)}
  .badge-clover .dot{background:var(--clover)}

  /* ── Info / Why callouts ── */
  .info-why{
    background:#DADEF7;border-radius:8px;padding:12px 16px;margin:12px 0;
    font-size:.92rem;color:#333;border-left:4px solid var(--cph);
  }
  .info-why strong{color:var(--cph)}

  /* ── Two-column account cards ── */
  .account-grid{
    display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0;
  }
  .account-card{
    border-radius:10px;padding:16px;border:1px solid var(--border);
  }
  .account-card.cph-card{border-left:4px solid var(--cph)}
  .account-card.clover-card{border-left:4px solid var(--clover)}
  .account-card h3{margin:0 0 4px;font-size:1rem}
  .account-card .email{font-size:.88rem;color:var(--muted);margin-bottom:10px;font-family:monospace}
  .account-card ul{margin:0;padding-left:18px;font-size:.92rem;line-height:1.8}

  /* ── Roadmap ── */
  .roadmap{margin:20px 0;display:flex;flex-direction:column;gap:0}
  .roadmap-item{
    display:flex;align-items:flex-start;gap:14px;padding:10px 0;
    position:relative;
  }
  .roadmap-item:not(:last-child)::after{
    content:'';position:absolute;left:15px;top:36px;bottom:0;
    width:2px;background:#dde2ed;
  }
  .roadmap-dot{
    width:32px;height:32px;border-radius:50%;
    background:var(--cph);color:#fff;font-weight:700;
    display:flex;align-items:center;justify-content:center;
    font-size:.82rem;flex-shrink:0;position:relative;z-index:1;
  }
  .roadmap-text{min-width:0}
  .roadmap-text .name{font-weight:700;font-size:.95rem;color:var(--text)}
  .roadmap-text .time{font-size:.82rem;color:var(--muted)}

  /* ── Welcome ── */
  .welcome-heading{
    font-size:1.5rem;font-weight:700;color:var(--text);margin:0 0 8px;
    text-align:center;
  }
  .welcome-sub{
    font-size:.95rem;color:var(--muted);text-align:center;
    max-width:540px;margin:0 auto 20px;line-height:1.6;
  }

  /* ── Images ── */
  .img{
    max-width:100%;height:auto;border:1px solid #e3e8f0;
    border-radius:6px;margin-top:10px;background:#fafbfd;
  }
  .img-fallback{
    border:1px dashed #cbd5e1;border-radius:6px;margin-top:10px;
    padding:24px 16px;background:#f8fafc;color:#94a3b8;
    text-align:center;font-size:.9rem;
  }

  /* ── Controls ── */
  .controls{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
  button{
    padding:10px 18px;border-radius:8px;border:1px solid #d0d7e6;
    background:#fff;cursor:pointer;font-size:.92rem;font-weight:600;
    transition:all .15s;min-height:44px;
  }
  button:hover{background:#f5f7fa}
  button:focus-visible{outline:2px solid var(--cph);outline-offset:2px}
  button.primary{background:var(--cph);color:#fff;border-color:var(--cph)}
  button.primary:hover{background:#3a3fc2}
  button:disabled{opacity:.45;cursor:not-allowed}
  input[type="checkbox"]:focus-visible,
  input[type="radio"]:focus-visible{outline:2px solid var(--cph);outline-offset:2px}
  a:focus-visible{outline:2px solid var(--cph);outline-offset:2px}
  label{display:block;margin:8px 0;font-size:.94rem;cursor:pointer}
  label input[type="checkbox"],
  label input[type="radio"]{margin-right:8px;cursor:pointer}

  /* ── Footer ── */
  footer{
    margin-top:16px;padding-top:12px;border-top:1px solid var(--border);
    font-size:.85rem;color:var(--muted);
    display:flex;justify-content:space-between;align-items:center;
    gap:12px;flex-wrap:wrap;
  }
  footer a{color:var(--cph)}
  .legend{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .legend-item{display:inline-flex;align-items:center;gap:5px}
  .swatch{width:10px;height:10px;border-radius:2px;display:inline-block}

  /* ── Modal ── */
  .modal{
    position:fixed;left:50%;top:15%;transform:translateX(-50%);
    width:90%;max-width:500px;z-index:50;
    box-shadow:0 12px 40px rgba(0,0,0,.15);
  }
  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:40;
  }
  .hidden{display:none}

  /* ── Responsive ── */
  @media(max-width:700px){
    .controls{justify-content:space-between}
    .account-grid{grid-template-columns:1fr}
    .wrap{padding:16px}
    .phase-row{flex-direction:column;align-items:flex-start;gap:4px}
  }
  @media(max-width:480px){
    .phase-labels{display:none}
    .welcome-heading{font-size:1.25rem}
  }
</style>
</head>
<body>

<div class="wrap" role="application" aria-label="Mac Setup Wizard">
  <header>
    <img class="header-logo" src="./images/branding/counterpart-health-logo.png" alt="Counterpart Health" onerror="this.style.display='none'">
    <div class="sub">Follow the steps in order. Estimated time: <strong>~90 minutes</strong>.</div>
    <div class="phase-row">
      <div class="phase-heading" id="phaseTitle">Phase 1 of 5: Before You Begin</div>
      <div class="pill" id="stepBadge">Step 1 of 3</div>
    </div>
  </header>

  <div class="progress-wrap" id="progressBar"></div>
  <div class="phase-labels" id="phaseLabels"></div>

  <div id="stepArea" class="card"></div>

  <div class="controls">
    <button id="backBtn" onclick="prevStep()">&larr; Back</button>
    <button id="helpBtn" onclick="openHelp()">Help</button>
    <button id="nextBtn" class="primary" onclick="nextStep()">Next &rarr;</button>
  </div>

  <footer>
    <div>Live support: <a href="#" style="color:var(--cph);text-decoration:underline">via Zoom</a> <span style="color:#aaa;font-size:.8rem">[placeholder]</span> (09:00-13:00 ET) &nbsp;|&nbsp; Email: <a href="mailto:laptopsetup@counterparthealth.com">laptopsetup@counterparthealth.com</a></div>
    <div class="legend" id="footerKey">
      <span class="legend-item"><span class="swatch" style="background:var(--cph)"></span><span style="color:var(--cph);font-weight:700">Counterpart Health</span></span>
      <span style="color:#ccc">|</span>
      <span class="legend-item"><span class="swatch" style="background:var(--clover)"></span><span style="color:var(--clover);font-weight:700">Clover Health</span></span>
    </div>
  </footer>
</div>

<div id="helpOverlay" class="modal-overlay hidden" onclick="closeHelp()"></div>
<div id="helpModal" class="card modal hidden" role="dialog" aria-modal="true">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <h3 id="helpTitle" style="margin:0">Help</h3>
    <button onclick="closeHelp()" style="padding:6px 12px">Close</button>
  </div>
  <div id="helpContent" style="margin-top:12px"></div>
</div>

<script>
/* ─────────────────────────────────────
   IMAGE MAP
   ───────────────────────────────────── */
const IMAGES = {
  country: "./images/mac-setup/02-country-region.png",
  setupNew: "./images/mac-setup/03-set-up-as-new.png",
  accessibility: "./images/mac-setup/04-accessibility.png",
  wifi: "./images/mac-setup/05-wifi-network.png",
  enroll: "./images/mac-setup/06-enroll-device-management.png",
  continueEnroll: "./images/mac-setup/06b-continue-enrolling.png",
  update: "./images/mac-setup/07-macos-update.png",
  enterEmail: "./images/mac-setup/08-enter-cph-email.png",
  locationServices: "./images/mac-setup/09-enable-location-services.png",
  login: "./images/mac-setup/10-login-screen.png",
  filevault: "./images/mac-setup/12-filevault-enable-now.png",
  touchid: "./images/mac-setup/13-touch-id.png",
  defaultBrowser: "./images/mac-setup/14-default-browser-chrome.png",
  absorb: "./images/mac-setup/15-absorb-tile.png",
  chromeSignIn: "./images/mac-setup/16-chrome-sign-in.png",
  chromeAddAccount: "./images/mac-setup/16-chrome-add-account.png",
  cloverOkta: "./images/mac-setup/17-clover-okta.png",
  counterpartOkta: "./images/mac-setup/17-counterpart-okta.png",
  zscaler: "./images/mac-setup/18-zscaler-connected.png",
  oktaVerifyClover: "./images/mac-setup/19a-okta-verify-clover.png",
  oktaVerifyCloverDone: "./images/mac-setup/19b-okta-verify-clover-done.png",
  oktaVerifyCph: "./images/mac-setup/19c-okta-verify-cph.png",
  oktaVerifyBothDone: "./images/mac-setup/19d-okta-verify-both-done.png",
  zoom: "./images/mac-setup/20-zoom-sso.png",
  slack: "./images/mac-setup/21-slack-sign-in.png",
  jamfOtp: "./images/mac-setup/22-jamf-otp-settings.png",
  backupCode: "./images/mac-setup/23-backup-code.png"
};

function img(src, alt, fallback){
  return `<img class="img" src="${src}" alt="${alt}" onerror="this.outerHTML='<div class=\\'img-fallback\\'>${fallback||alt+' screenshot will appear here.'}</div>'"/>`;
}

/* ─────────────────────────────────────
   PHASES & STEPS
   ───────────────────────────────────── */
const phases = [
  { name: "Before You Begin", steps: [] },
  { name: "Mac Initial Setup", steps: [] },
  { name: "Device Security", steps: [] },
  { name: "Apps & Accounts", steps: [] },
  { name: "Final Setup", steps: [] }
];

const steps = [
  // ── Phase 1: Before You Begin ──
  { id:'welcome', phase:0, title:'Welcome to Counterpart Health!', render:renderWelcome, help:'This guide walks you through setting up your new Mac, step by step. You can take breaks whenever you need.' },
  { id:'prework', phase:0, title:'Getting Started (Pre-work)', render:renderPrework, help:'Complete all pre-work items before powering on your Mac. You need Okta Verify installed on your phone and both Okta accounts activated.' },
  { id:'twoAccounts', phase:0, title:'Understanding Your Two Accounts', render:renderTwoAccounts, help:'You have two separate accounts: Clover Health and Counterpart Health. Throughout setup, we will tell you which one to use. Look for the color coding.' },

  // ── Phase 2: Mac Initial Setup ──
  { id:'poweron', phase:1, title:'Power On Your Mac', render:renderPowerOn, help:'Press and hold the power button on your Mac until you see the Apple logo.' },
  { id:'country', phase:1, title:'Select Your Country', render:renderCountry, help:'Select your country or region and click Continue.' },
  { id:'transfer', phase:1, title:'Set Up as New', render:renderTransfer, help:'Choose "Set up as new" so the device provisions correctly. Do not transfer data from another Mac.' },
  { id:'accessibility', phase:1, title:'Accessibility Preferences (Optional)', render:renderAccessibility, help:'Set accessibility preferences if needed, otherwise click Not Now.' },
  { id:'wifi', phase:1, title:'Connect to Wi-Fi', render:renderWifi, help:'Join a stable Wi-Fi network before continuing.' },
  { id:'enroll', phase:1, title:'Enroll with Counterpart Health', render:renderEnroll, help:'If an error occurs, click "OK" or "Retry" (it may take a few tries). You may need to go all the way back to the Language/Region screen.' },

  // ── Phase 3: Device Security ──
  { id:'osupdate', phase:2, title:'Check for macOS Updates', render:renderOsUpdate, help:'If your Mac requires a software update, complete it. After the restart you will return to Select Your Country and continue from there.' },
  { id:'continueEnroll', phase:2, title:'Continue Enrolling with Counterpart Health', render:renderContinueEnroll, help:'If you do not see "Continue", the computer will automatically continue once complete.' },
  { id:'locationServices', phase:2, title:'Enable Location Services', render:renderLocationServices, help:'Enable Location Services when prompted.' },
  { id:'loginCPH', phase:2, title:'Log In with Counterpart Health', render:renderLoginCPH, help:'If you\'ve forgotten your password or have difficulty logging in, email laptopsetup@counterparthealth.com or join our Zoom office hours (09:00-13:00 ET) ASAP.' },
  { id:'filevault', phase:2, title:'Enable FileVault', render:renderFileVault, help:'FileVault encrypts your hard drive. Click Enable Now when prompted.' },
  {    id:'touchid',    phase:2,    title:'Set Up Touch ID',    render:renderTouchID,    help:'Touch ID is strongly recommended. You can set it up later, but setting it up now makes sign-ins and identity verification much easier.'  },

  // ── Phase 4: Apps & Accounts ──
  { id:'chromeDefault', phase:3, title:'Set Chrome as Default Browser', render:renderChromeDefault, help:'In the top left, click the Apple icon > System Settings > search "Default web browser" > change to Google Chrome.' },
  { id:'absorb', phase:3, title:'Complete Security Training', render:renderAbsorb, help:'Open Chrome, go to cloverhealth.okta.com, sign in with your Clover Health email, and complete the required Absorb training.' },
  { id:'cphOkta', phase:3, title:'Sign Into Counterpart Health Okta', render:renderCphOkta, help:'Sign in at counterparthealth.okta.com with your Counterpart Health credentials.' },
  { id:'chromeSignIn', phase:3, title:'Sign Into Chrome', render:renderChromeSignIn, help:'Sign into Chrome with Clover first, then add a second profile for Counterpart Health.' },
  { id:'zscaler', phase:3, title:'Connect to Zscaler VPN', render:renderZscaler, help:'Sign into Zscaler with your Clover Health email and confirm it shows connected.' },
  { id:'oktaVerifyMac', phase:3, title:'Set Up Okta Verify on Your Mac', render:renderOktaVerifyMac, help:'Setting up Okta Verify on your Mac lets you use Touch ID instead of your phone to verify when logging into apps.' },
  { id:'zoomSlack', phase:3, title:'Set Up Zoom and Slack', render:renderZoomSlack, help:'If prompted for your email and password for Okta, use your Clover Health account for Zoom and your Counterpart Health account for Slack. To find either app, click the magnifying glass in the top right corner and type Zoom or Slack.' },

  // ── Phase 5: Final Setup ──
  { id:'offlineMFA', phase:4, title:'Set Up Backup Authentication', render:renderOfflineMFA, help:'Jamf OTP gives you a way to verify your identity even when you don\'t have internet access. Save your backup code somewhere safe.' },
  { id:'congrats', phase:4, title:'You\'re All Set!', render:renderCongrats, help:'Your Mac is fully configured. Head to Foundations onboarding to continue your first day.' },
];

// Build the phase step index
steps.forEach((s,i) => { phases[s.phase].steps.push(i); });

let current = 0;
let state = {};
const STORAGE_KEY = 'cph_wizard_progress';

/* ─────────────────────────────────────
   RENDER ENGINE
   ───────────────────────────────────── */
function render(){
  const s = steps[current];
  const phase = phases[s.phase];
  const stepsInPhase = phase.steps;
  const stepInPhase = stepsInPhase.indexOf(current) + 1;

  // Header
  document.getElementById('phaseTitle').textContent =
    `Phase ${s.phase+1} of ${phases.length}: ${phase.name}`;
  document.getElementById('stepBadge').textContent =
    `Step ${stepInPhase} of ${stepsInPhase.length}`;
  // Hide step badge on welcome screen
  document.getElementById('stepBadge').style.display = s.id==='welcome'?'none':'';

  // Progress bar
  renderProgress(s.phase, stepsInPhase, stepInPhase);

  // Content (with fade transition)
  const area = document.getElementById('stepArea');
  area.style.opacity = '0';
  setTimeout(() => {
    area.innerHTML = `<div class="step-title">${s.title}</div>`;
    s.render(area);
    area.style.opacity = '1';
  }, 80);

  // Buttons
  document.getElementById('backBtn').disabled = current === 0;
  const isLast = current === steps.length - 1;
  document.getElementById('nextBtn').textContent = isLast ? 'Finish' : 'Next \u2192';
  document.getElementById('nextBtn').style.display = s.id==='congrats'?'none':'';
  document.getElementById('backBtn').style.display = s.id==='congrats'?'none':'';
  document.getElementById('helpBtn').style.display = s.id==='congrats'?'none':'';

  // Show key only on pages that reference Clover/CPH accounts
  const keyPages = ['prework','twoAccounts','loginCPH','absorb','chromeSignIn','cphOkta','zscaler','oktaVerifyMac','zoomSlack','congrats','continueEnroll'];
  document.getElementById('footerKey').style.display = keyPages.includes(s.id)?'':'none';

  saveProgress();
}

function renderProgress(activePhase, stepsInPhase, stepInPhase){
  const bar = document.getElementById('progressBar');
  const labels = document.getElementById('phaseLabels');
  bar.innerHTML = '';
  labels.innerHTML = '';
  phases.forEach((p,i) => {
    const seg = document.createElement('div');
    seg.className = 'progress-seg';
    const fill = document.createElement('div');
    fill.className = 'fill';
    if(i < activePhase) fill.style.width = '100%';
    else if(i === activePhase) fill.style.width = Math.round((stepInPhase/stepsInPhase.length)*100)+'%';
    else fill.style.width = '0%';
    seg.appendChild(fill);
    bar.appendChild(seg);

    const lbl = document.createElement('div');
    lbl.className = 'phase-label' + (i===activePhase?' active':'');
    lbl.textContent = p.name;
    labels.appendChild(lbl);
  });
}

/* ─────────────────────────────────────
   NAVIGATION
   ───────────────────────────────────── */
function nextStep(){
  const s = steps[current];
  if(validators[s.id] && !validators[s.id]()) return;
  if(current < steps.length - 1){ current++; render(); window.scrollTo(0,0); }
  else { alert('Wizard complete!'); }
}
function prevStep(){
  if(current > 0){ current--; render(); window.scrollTo(0,0); }
}

/* ─────────────────────────────────────
   HELP MODAL
   ───────────────────────────────────── */
function openHelp(){
  const s = steps[current];
  document.getElementById('helpTitle').textContent = `Help — ${s.title}`;
  document.getElementById('helpContent').textContent = s.help || '';
  document.getElementById('helpModal').classList.remove('hidden');
  document.getElementById('helpOverlay').classList.remove('hidden');
}
function closeHelp(){
  document.getElementById('helpModal').classList.add('hidden');
  document.getElementById('helpOverlay').classList.add('hidden');
}

/* ─────────────────────────────────────
   LOCALSTORAGE
   ───────────────────────────────────── */
function saveProgress(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      current, state, ts: Date.now()
    }));
  }catch(e){}
}
function loadProgress(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    const data = JSON.parse(raw);
    if(Date.now() - data.ts > 7*24*60*60*1000) return null; // expire after 7 days
    return data;
  }catch(e){ return null; }
}
function resumeProgress(){
  const data = loadProgress();
  if(data){
    current = Math.min(data.current, steps.length-1);
    state = data.state || {};
  }
  render();
}

/* ─────────────────────────────────────
   VALIDATORS
   ───────────────────────────────────── */
const validators = {
  prework(){
    const ok = document.getElementById('pre_okta')?.checked;
    const act = document.getElementById('pre_activate')?.checked;
    const saved = document.getElementById('pre_saved')?.checked;
    const wifi = document.getElementById('pre_wifi')?.checked;
    if(!ok||!act||!saved||!wifi){
      alert('Please confirm all pre-work items before continuing.');
      return false;
    }
    return true;
  },
  osupdate(){
    const chosen = document.querySelector('input[name="updateOption"]:checked');
    if(!chosen){ alert('Please select whether you were prompted to update or not.'); return false; }
    if(chosen.value === 'inprogress'){
      state.osUpdated = true;
      // Jump back to Country step
      const countryIdx = steps.findIndex(s=>s.id==='country');
      if(countryIdx >= 0){
        alert('After the update completes and your Mac restarts, continue from Select Your Country.');
        current = countryIdx;
        render();
        return false;
      }
    }
    return true;
  },
  loginCPH(){
    const push = document.getElementById('method_push')?.checked;
    const code = document.getElementById('method_code')?.checked;
    if(!push && !code){
      alert('Please confirm which Okta Verify method you used.');
      return false;
    }
    return true;
  }
};

/* ─────────────────────────────────────
   PHASE 1 RENDERERS
   ───────────────────────────────────── */
function renderWelcome(container){
  container.insertAdjacentHTML('beforeend', `
    <p class="welcome-sub" style="text-align:left;max-width:none;margin:0 0 16px">
      We're glad you're here. This guide will walk you through setting up your Mac, step by step.
      Most people finish in about 90 minutes, and you can take breaks whenever you need.
    </p>

    <div style="font-weight:700;font-size:.85rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">
      Setup Roadmap
    </div>

    <div class="roadmap">
      <div class="roadmap-item">
        <div class="roadmap-dot">1</div>
        <div class="roadmap-text">
          <div class="name">Before You Begin</div>
          <div class="time">Pre-work you'll do before turning on your Mac (~5 min)</div>
        </div>
