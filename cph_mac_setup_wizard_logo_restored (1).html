<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Mac Setup Wizard</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
  :root{
    --cph-blue:#444AD3;
    --clover-green:#0F4D43;
    --warn:#c11;
    --muted:#666;
    --bg:#f6f8fb;
  }
  body{
    font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    margin:0;
    padding:20px;
    color:#111;
  }
  .wrap{
    max-width:980px;
    margin:18px auto;
    background:#fff;
    border-radius:10px;
    padding:20px;
    box-shadow:0 8px 24px rgba(12,24,48,0.06);
  }
  header{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:16px;
  }
  .header-left{
    display:flex;
    align-items:flex-start;
    gap:16px;
    flex:1;
    min-width:0;
  }
  .header-logo{
    display:block;
    max-height:64px;
    width:auto;
  }
  .header-copy{
    min-width:0;
  }
  h1{
    margin:0;
    font-weight:700;
    font-size:20px;
    color:#000;
  }
  .small{font-size:.92rem;color:var(--muted)}
  .progressbar{
    height:10px;
    background:#eee;
    border-radius:999px;
    margin:14px 0;
    overflow:hidden;
  }
  .progressbar .fill{
    height:100%;
    background:var(--cph-blue);
    width:0%;
  }
  .card{
    border-radius:8px;
    padding:16px;
    margin:12px 0;
    border:1px solid #e8edf5;
    background:#fff;
  }
  .step-title{
    font-weight:700;
    color:var(--cph-blue);
    margin-bottom:8px;
    font-size:1.15rem;
  }
  .pill{
    display:inline-block;
    background:#eef3fb;
    color:var(--cph-blue);
    padding:8px 14px;
    border-radius:999px;
    font-weight:700;
    white-space:nowrap;
  }
  .warn{
    border-left:6px solid var(--warn);
    background:#fff6f6;
    padding:10px;
    margin:10px 0;
    font-weight:700;
    color:var(--warn);
  }
  .info{
    border-left:6px solid var(--cph-blue);
    background:#f3f6ff;
    padding:10px;
    margin:10px 0;
  }
  .img{
    max-width:100%;
    height:auto;
    border:1px solid #e3e8f0;
    border-radius:6px;
    margin-top:12px;
    background:#fafbfd;
  }
  .img-fallback{
    border:1px dashed #cbd5e1;
    border-radius:6px;
    margin-top:12px;
    padding:28px 18px;
    background:#f8fafc;
    color:#475569;
    text-align:center;
    font-size:.95rem;
  }
  label{display:block;margin:10px 0;font-size:.96rem}
  input[type="text"], input[type="password"]{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:1px solid #d8e0ee;
    font-size:.95rem;
    box-sizing:border-box;
  }
  .controls{
    display:flex;
    gap:10px;
    justify-content:flex-end;
    margin-top:18px;
  }
  button{
    padding:8px 14px;
    border-radius:8px;
    border:1px solid #d0d7e6;
    background:#fff;
    cursor:pointer;
  }
  button.primary{
    background:var(--cph-blue);
    color:#fff;
    border-color:var(--cph-blue);
  }
  button:disabled{opacity:.55;cursor:not-allowed;}
  .clover{color:var(--clover-green);font-weight:700}
  .cph{color:var(--cph-blue);font-weight:700}
  footer{
    margin-top:14px;
    font-size:.9rem;
    color:var(--muted);
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:16px;
    flex-wrap:wrap;
  }
  .legend{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .legend-item{
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .swatch{
    width:12px;
    height:12px;
    border-radius:2px;
    display:inline-block;
  }
  .hidden{display:none}
  .inline-help{color:var(--muted);font-size:.95rem}
  .modal{
    position:fixed;
    left:50%;
    top:12%;
    transform:translateX(-50%);
    width:88%;
    max-width:720px;
    z-index:50;
  }
  @media (max-width:700px){
    header{flex-direction:column;align-items:flex-start}
    .controls{justify-content:space-between}
    .header-left{flex-direction:column;align-items:flex-start}
  }
</style>
</head>
<body>
<div class="wrap" role="application" aria-label="Mac Setup Wizard">
  <header>
    <div class="header-left">
      <img class="header-logo" src="./images/branding/counterpart-health-logo.png" alt="Counterpart Health logo" onerror="this.style.display='none'">
      <div class="header-copy">
        <h1>Mac Setup Wizard</h1>
        <div class="small">Follow the steps in order. Estimated time: <strong>1.5–2 hours</strong>.</div>
      </div>
    </div>
    <div class="pill" id="stepBadge">Step 1 of 21</div>
  </header>

  <div class="progressbar" aria-hidden="true"><div class="fill" id="progressFill"></div></div>

  <div id="stepArea" class="card"></div>

  <div class="controls">
    <button id="backBtn" onclick="prevStep()" aria-label="Back">&larr; Back</button>
    <button id="helpBtn" onclick="openHelp()">Help</button>
    <button id="nextBtn" class="primary" onclick="nextStep()">Next →</button>
  </div>

  <footer>
    <div class="small">Live support: Zoom office hours (09:00–13:00 ET) — Email: <a href="mailto:laptopsetup@counterparthealth.com">laptopsetup@counterparthealth.com</a></div>
    <div class="legend small">
      <span><strong>Key:</strong></span>
      <span class="legend-item"><span class="swatch" style="background:var(--cph-blue)"></span><span class="cph">Counterpart Health</span></span>
      <span class="legend-item"><span class="swatch" style="background:var(--clover-green)"></span><span class="clover">Clover Health</span></span>
    </div>
  </footer>
</div>

<div id="helpModal" class="card modal hidden" role="dialog" aria-modal="true">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <h3 id="helpTitle" style="margin:0">Help</h3>
    <button onclick="closeHelp()">Close</button>
  </div>
  <div id="helpContent" style="margin-top:12px"></div>
</div>

<script>
const IMAGES = {
  country: "./images/mac-setup/02-country-region.png",
  setupNew: "./images/mac-setup/03-set-up-as-new.png",
  accessibility: "./images/mac-setup/04-accessibility.png",
  wifi: "./images/mac-setup/05-wifi-network.png",
  enroll: "./images/mac-setup/06-enroll-device-management.png",
  update: "./images/mac-setup/07-macos-update.png",
  enterEmail: "./images/mac-setup/08-enter-cph-email.png",
  login: "./images/mac-setup/10-login-screen.png",
  oktaPhone: "./images/mac-setup/11-okta-verify-phone-prompt.png",
  filevault: "./images/mac-setup/12-filevault-enable-now.png",
  touchid: "./images/mac-setup/13-touch-id.png",
  defaultBrowser: "./images/mac-setup/14-default-browser-chrome.png",
  absorb: "./images/mac-setup/15-absorb-tile.png",
  chromeProfiles: "./images/mac-setup/16-chrome-profiles.png",
  counterpartOkta: "./images/mac-setup/17-counterpart-okta.png",
  zscaler: "./images/mac-setup/18-zscaler-connected.png",
  zoom: "./images/mac-setup/20-zoom-sso.png",
  slack: "./images/mac-setup/21-slack-sign-in.png",
  jamfOtp: "./images/mac-setup/22-jamf-otp-settings.png",
  backupCode: "./images/mac-setup/23-backup-code.png"
};

function imageOrFallback(src, alt, label){
  return `<img class="img" src="${src}" alt="${alt}" onerror="this.outerHTML='<div class=&quot;img-fallback&quot;>${label}</div>'"/>`;
}

const steps = [
  { id: 'prework', title: 'Getting Started (Pre-work)', render: prework },
  { id: 'poweron', title: 'Power on your Mac', render: powerOn },
  { id: 'country', title: 'Select your country', render: selectCountry },
  { id: 'transfer', title: 'Transfer data — Select "Set up as new"', render: transfer },
  { id: 'access', title: 'Set Accessibility Preferences (Optional)', render: accessibility },
  { id: 'wifi', title: 'Select Your Wi-Fi Network', render: wifi },
  { id: 'enroll', title: 'Enroll with Counterpart Health', render: enroll },
  { id: 'osupdate', title: 'macOS Update - choose option', render: osUpdate },
  { id: 'enteremail', title: 'Enter your CPH email', render: enterEmail },
  { id: 'passwordHelp', title: 'Password help', render: passwordHelp },
  { id: 'oktaMFA', title: 'MFA — Okta Verify (choose method)', render: oktaMFA },
  { id: 'filevault', title: 'Enable FileVault', render: filevault },
  { id: 'touchid', title: 'Touch ID (Optional)', render: touchid },
  { id: 'chromeDefault', title: 'Set Chrome as default', render: chromeDefault },
  { id: 'absorb', title: 'Counterpart Health Security Training (Absorb)', render: absorb },
  { id: 'chromeSignIn', title: 'Sign into Chrome (Clover then CPH)', render: chromeSignIn },
  { id: 'cphOkta', title: 'Sign into Counterpart Health Okta', render: cphOkta },
  { id: 'zscaler', title: 'Zscaler (VPN)', render: zscaler },
  { id: 'zoomSlack', title: 'Zoom & Slack (separate)', render: zoomSlack },
  { id: 'offlineMFA', title: 'Offline MFA (Jamf OTP)', render: offlineMFA },
  { id: 'congrats', title: 'Congratulations', render: congrats }
];

let current = 0;
let state = { updated: false };

const helpTexts = {
  prework: 'Install Okta Verify, activate both Okta accounts, save both passwords, and make sure you have stable Wi-Fi before you start.',
  poweron: 'Power on your Mac.',
  country: 'Select your country or region and click Continue.',
  transfer: 'Choose Set up as new so the device provisions correctly.',
  access: 'Accessibility is optional. Set it if needed or continue.',
  wifi: 'Join a stable Wi-Fi network before continuing.',
  enroll: 'Click Enroll when prompted for device management.',
  osupdate: 'If the Mac requires an update, complete it. After restart, continue from Transfer data.',
  enteremail: 'Enter your full Counterpart Health email address.',
  passwordHelp: 'Use the password you created during Counterpart Health Okta activation.',
  oktaMFA: 'Approve the push or enter a code from Okta Verify.',
  filevault: 'Enable FileVault when prompted.',
  touchid: 'Touch ID is optional.',
  chromeDefault: 'Set Chrome as the default browser.',
  absorb: 'Complete the required Absorb training.',
  chromeSignIn: 'Create your Clover Chrome profile first, then your Counterpart Health profile.',
  cphOkta: 'Sign in at counterparthealth.okta.com with your Counterpart Health credentials.',
  zscaler: 'Sign into Zscaler and confirm it shows connected.',
  zoomSlack: 'Use Clover SSO for Zoom and your Counterpart Health email for Slack.',
  offlineMFA: 'Set up Jamf OTP and save your backup code.',
  congrats: 'You are done. Proceed to Foundations onboarding.'
};

function render(){
  const area = document.getElementById('stepArea');
  area.innerHTML = '';
  if(steps[current].id === 'osupdate' && state.updated) current++;
  const s = steps[current];
  area.insertAdjacentHTML('beforeend', `<div class="step-title">${s.title}</div>`);
  s.render(area);
  const pct = Math.round((current/(steps.length-1))*100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('stepBadge').innerText = `Step ${current+1} of ${steps.length}`;
  document.getElementById('backBtn').disabled = current === 0;
  document.getElementById('nextBtn').innerText = current === steps.length-1 ? 'Finish' : 'Next →';
}

function openHelp(){
  const id = steps[current].id;
  document.getElementById('helpTitle').innerText = `Help — ${steps[current].title}`;
  document.getElementById('helpContent').innerHTML = helpTexts[id] || '';
  document.getElementById('helpModal').classList.remove('hidden');
}
function closeHelp(){ document.getElementById('helpModal').classList.add('hidden'); }

function prework(container){
  container.insertAdjacentHTML('beforeend', `
    <div class="small"><strong>Complete these steps before powering on your Mac.</strong></div>
    <ul>
      <li>Download and install <strong>Okta Verify</strong> on your phone.</li>
      <li>Activate both Okta accounts: <span class="clover">first.last@cloverhealth.com</span> and <span class="cph">first.last@counterparthealth.com</span>.</li>
      <li>Save both passwords in a secure password manager.</li>
      <li>Make sure you have a stable Wi-Fi connection.</li>
    </ul>
    <label><input id="pre_okta" type="checkbox"> I installed Okta Verify</label>
    <label><input id="pre_activate" type="checkbox"> I activated both Okta accounts</label>
    <label><input id="pre_saved" type="checkbox"> I saved both passwords</label>
  `);
}
function powerOn(container){
  container.insertAdjacentHTML('beforeend', ``);
}
function selectCountry(container){
  container.insertAdjacentHTML('beforeend', `
    <p>Select your country and click Continue.</p>
    ${imageOrFallback(IMAGES.country, 'Country selection', 'Country or region screenshot goes here.')}
  `);
}
function transfer(container){
  container.insertAdjacentHTML('beforeend', `
    <p><strong>Select "Set up as new"</strong> to proceed.</p>
    ${imageOrFallback(IMAGES.setupNew, 'Set up as new', 'Set up as new screenshot goes here.')}
  `);
}
function accessibility(container){
  container.insertAdjacentHTML('beforeend', `
    <p>Set Accessibility Preferences if needed. Otherwise, select Not Now.</p>
    ${imageOrFallback(IMAGES.accessibility, 'Accessibility screen', 'Accessibility screenshot goes here.')}
  `);
}
function wifi(container){
  container.insertAdjacentHTML('beforeend', `
    <p>Select your Wi-Fi network and enter the password, then click Join.</p>
    ${imageOrFallback(IMAGES.wifi, 'Wi-Fi screen', 'Wi-Fi screenshot goes here.')}
  `);
}
function enroll(container){
  container.insertAdjacentHTML('beforeend', `
    <p>Click <strong>Enroll</strong> to start device management.</p>
    ${imageOrFallback(IMAGES.enroll, 'Enroll screen', 'Enroll screenshot goes here.')}
  `);
}
function osUpdate(container){
  container.insertAdjacentHTML('beforeend', `
    <p>If the Mac prompts for a software update, select the option that matches your case:</p>
    <label><input name="updateOption" type="radio" value="inprogress"> Update was prompted and is in progress.</label>
    <label><input name="updateOption" type="radio" value="notprompted"> I was not prompted to update.</label>
    ${imageOrFallback(IMAGES.update, 'Software update', 'macOS update screenshot goes here.')}
  `);
}
function enterEmail(container){
  container.insertAdjacentHTML('beforeend', `
    <p>Enter your Counterpart Health email: <code class="cph">first.last@counterparthealth.com</code>.</p>
    ${imageOrFallback(IMAGES.enterEmail, 'Enter email screen', 'Enter email screenshot goes here.')}
  `);
}
function passwordHelp(container){
  container.insertAdjacentHTML('beforeend', `
    <p>Username: <code>first.last</code><br>Password: the password you created for Counterpart Health during Okta activation.</p>
    ${imageOrFallback(IMAGES.login, 'Login screen', 'Login screen screenshot goes here.')}
  `);
}
function oktaMFA(container){
  container.insertAdjacentHTML('beforeend', `
    <p>Choose either a code from Okta Verify or a push notification approval.</p>
    ${imageOrFallback(IMAGES.oktaPhone, 'Okta Verify phone prompt', 'Okta Verify phone prompt screenshot goes here.')}
    <label><input id="method_code" type="checkbox"> I used a code</label>
    <label><input id="method_push" type="checkbox"> I approved a push</label>
  `);
}
function filevault(container){
  container.insertAdjacentHTML('beforeend', `
    <p><strong>Enable FileVault</strong> — click Enable Now, then OK.</p>
    ${imageOrFallback(IMAGES.filevault, 'FileVault screen', 'FileVault screenshot goes here.')}
  `);
}
function touchid(container){
  container.insertAdjacentHTML('beforeend', `
    <p>Set up Touch ID if you want. This is optional.</p>
    ${imageOrFallback(IMAGES.touchid, 'Touch ID screen', 'Touch ID screenshot goes here.')}
  `);
}
function chromeDefault(container){
  container.insertAdjacentHTML('beforeend', `
    <p>Set Chrome as your default browser in System Settings.</p>
    ${imageOrFallback(IMAGES.defaultBrowser, 'Default browser setting', 'Default browser screenshot goes here.')}
  `);
}
function absorb(container){
  container.insertAdjacentHTML('beforeend', `
    <p>Open Chrome, go to <span class="cph">cloverhealth.okta.com</span>, sign in with your <span class="clover">Clover Health</span> email, and complete the required Absorb training.</p>
    ${imageOrFallback(IMAGES.absorb, 'Absorb tile', 'Absorb screenshot goes here.')}
  `);
}
function chromeSignIn(container){
  container.insertAdjacentHTML('beforeend', `
    <ol>
      <li>Sign in with <span class="clover">first.last@cloverhealth.com</span> first.</li>
      <li>Add a second Chrome profile for <span class="cph">first.last@counterparthealth.com</span>.</li>
    </ol>
    ${imageOrFallback(IMAGES.chromeProfiles, 'Chrome profiles', 'Chrome profiles screenshot goes here.')}
  `);
}
function cphOkta(container){
  container.insertAdjacentHTML('beforeend', `
    <p>Sign into <span class="cph">counterparthealth.okta.com</span> using your Counterpart Health credentials.</p>
    ${imageOrFallback(IMAGES.counterpartOkta, 'Counterpart Okta', 'Counterpart Okta screenshot goes here.')}
  `);
}
function zscaler(container){
  container.insertAdjacentHTML('beforeend', `
    <p>Click the blue cloud and sign into Zscaler with your <span class="clover">Clover Health</span> email. Confirm the status shows connected.</p>
    ${imageOrFallback(IMAGES.zscaler, 'Zscaler connected', 'Zscaler screenshot goes here.')}
  `);
}
function zoomSlack(container){
  container.insertAdjacentHTML('beforeend', `
    <p><strong>Zoom:</strong> Sign in with SSO and enter <span class="clover">cloverhealth</span> as the domain.</p>
    ${imageOrFallback(IMAGES.zoom, 'Zoom SSO', 'Zoom screenshot goes here.')}
    <p><strong>Slack:</strong> Sign in with your Counterpart Health email and join the Counterpart Health workspace.</p>
    ${imageOrFallback(IMAGES.slack, 'Slack sign in', 'Slack screenshot goes here.')}
  `);
}
function offlineMFA(container){
  container.insertAdjacentHTML('beforeend', `
    <p>Set up Offline MFA (Jamf OTP), then save your backup code.</p>
    ${imageOrFallback(IMAGES.jamfOtp, 'Jamf OTP settings', 'Jamf OTP screenshot goes here.')}
    ${imageOrFallback(IMAGES.backupCode, 'Backup code', 'Backup code screenshot goes here.')}
  `);
}
function congrats(container){
  container.insertAdjacentHTML('beforeend', `
    <h3>Congratulations!</h3>
    <p>You have successfully enrolled your laptop.</p>
  `);
}

const validators = {
  prework: function(){
    const ok = document.getElementById('pre_okta')?.checked;
    const act = document.getElementById('pre_activate')?.checked;
    const saved = document.getElementById('pre_saved')?.checked;
    if(!ok || !act || !saved){ alert('Please confirm all pre-work steps.'); return false; }
    return true;
  },
  osupdate: function(){
    const chosen = document.querySelector('input[name="updateOption"]:checked');
    if(!chosen){ alert('Please select whether you were prompted to update or not.'); return false; }
    if(chosen.value === 'inprogress'){ state.updated = true; }
    return true;
  },
  oktaMFA: function(){
    const c = document.getElementById('method_code')?.checked;
    const p = document.getElementById('method_push')?.checked;
    if(!c && !p){ alert('Please confirm your MFA method.'); return false; }
    return true;
  }
};

function nextStep(){
  const id = steps[current].id;
  if(validators[id] && !validators[id]()) return;
  if(id === 'osupdate'){
    const chosen = document.querySelector('input[name="updateOption"]:checked').value;
    if(chosen === 'inprogress'){
      alert('After the update completes, continue again from Transfer data.');
      current = steps.findIndex(s=>s.id==='transfer');
      render();
      return;
    }
  }
  if(current < steps.length - 1){ current++; render(); }
  else { alert('Wizard complete.'); }
}
function prevStep(){ if(current > 0){ current--; render(); } }

render();
</script>
</body>
</html>
